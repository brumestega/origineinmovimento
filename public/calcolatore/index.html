<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mappa dei Talenti</title>
  <meta name="description" content="Mappa dei Talenti — strumento di lettura numerologica olistica. Scopri la tua mappa interiore a partire dalla data di nascita." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="src/styles.css" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header class="app-header">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">✦</span>
        <span class="brand__name" data-i18n="app.title">Mappa dei Talenti</span>
      </div>
      <div class="header-controls">
        <div class="lang-toggle" role="group" aria-label="Lingua / Language">
          <button type="button" data-lang-opt="it" aria-pressed="true">IT</button>
          <span class="sep" aria-hidden="true">/</span>
          <button type="button" data-lang-opt="en" aria-pressed="false">EN</button>
        </div>
        <button id="theme-toggle" class="icon-btn" type="button" aria-label="Cambia tema" data-i18n-attr="aria-label:theme.toggle" title="Tema">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8z"/></svg>
        </button>
        <button id="storico-toggle" class="icon-btn" type="button" aria-label="Apri lo storico" data-i18n-attr="aria-label:storico.open" title="Storico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        </button>
      </div>
    </header>

    <div id="banner-host" aria-live="polite"></div>

    <main class="app-main">
      <!-- SCHERMATA 1: FORM -->
      <section id="screen-form" class="screen">
        <div class="intro">
          <h1 class="intro__title" data-i18n="app.title">Mappa dei Talenti</h1>
          <div class="intro__rule" aria-hidden="true"></div>
          <p class="intro__subtitle" data-i18n="app.subtitle">Scopri la tua mappa interiore</p>
          <p class="intro__tagline" data-i18n="app.tagline">Uno strumento di lettura numerologica olistica</p>
        </div>

        <form id="mappa-form" class="form-card" novalidate>
          <p id="form-error" class="form-error" role="alert" hidden></p>

          <fieldset>
            <legend data-i18n="form.legend.identita">Chi sei</legend>
            <div class="field">
              <input class="field__input" id="f-nome" name="nome" type="text" placeholder=" " autocomplete="name" />
              <label class="field__label" for="f-nome" data-i18n="form.nome">Nome e Cognome</label>
              <p class="field__error" aria-live="polite"></p>
            </div>
          </fieldset>

          <fieldset>
            <legend data-i18n="form.legend.nascita">Data di nascita</legend>
            <div class="field-row">
              <div class="field">
                <input class="field__input" id="f-giorno" name="giorno" type="number" min="1" max="31" inputmode="numeric" placeholder=" " />
                <label class="field__label" for="f-giorno" data-i18n="form.giorno">Giorno</label>
                <p class="field__error" aria-live="polite"></p>
              </div>
              <div class="field">
                <select class="field__input" id="f-mese" name="mese" aria-describedby="f-mese-err"></select>
                <label class="field__label" for="f-mese" data-i18n="form.mese">Mese</label>
                <p class="field__error" id="f-mese-err" aria-live="polite"></p>
              </div>
              <div class="field">
                <input class="field__input" id="f-anno" name="anno" type="number" min="1900" max="2100" inputmode="numeric" placeholder=" " />
                <label class="field__label" for="f-anno" data-i18n="form.anno">Anno di nascita</label>
                <p class="field__error" aria-live="polite"></p>
              </div>
            </div>
          </fieldset>

          <button class="btn btn--gold form-submit" type="submit" data-i18n="form.submit">Calcola la tua mappa</button>
        </form>
      </section>

      <!-- SCHERMATA 1b: GATE EMAIL (raccolta email prima del risultato completo) -->
      <section id="screen-gate" class="screen" hidden>
        <div class="intro">
          <h1 class="intro__title" data-i18n="gate.title">Un ultimo passo</h1>
          <div class="intro__rule" aria-hidden="true"></div>
          <p class="intro__subtitle" data-i18n="gate.lead">Lascia la tua email: ti mostro subito la tua Mappa completa. È il mio regalo, gratuito.</p>
        </div>

        <form id="gate-form" class="form-card" novalidate>
          <p id="gate-error" class="form-error" role="alert" hidden></p>

          <div class="field">
            <input class="field__input" id="g-email" name="email" type="email" placeholder=" " autocomplete="email" />
            <label class="field__label" for="g-email" data-i18n="gate.email">La tua email</label>
            <p class="field__error" aria-live="polite"></p>
          </div>

          <label class="gate-check">
            <input type="checkbox" id="g-newsletter" checked />
            <span data-i18n="gate.newsletter">Iscrivimi alla newsletter per ricevere spunti e novità (puoi disiscriverti quando vuoi).</span>
          </label>

          <!-- honeypot anti-spam -->
          <input type="text" id="g-company" name="company" tabindex="-1" autocomplete="off" class="hp-field" aria-hidden="true" />

          <button class="btn btn--gold form-submit" type="submit" data-i18n="gate.submit">Mostra la mia Mappa ✦</button>
          <button type="button" id="gate-back" class="btn btn--ghost gate-back" data-i18n="gate.back">‹ Torna indietro</button>
        </form>
      </section>

      <!-- SCHERMATA 2: RISULTATI (popolata da ui.js) -->
      <section id="screen-results" class="screen" hidden>
        <div class="print-header" aria-hidden="true"></div>
        <div id="results-content"></div>
      </section>
    </main>
  </div>

  <!-- LOADER -->
  <div id="loader" role="status" aria-live="polite" hidden>
    <div class="loader__orbit" aria-hidden="true">
      <span class="loader__ring"></span>
      <span class="loader__ring loader__ring--inner"></span>
      <span class="loader__star"></span>
      <span class="loader__star"></span>
    </div>
    <p class="loader__text">Calcolando i tuoi pattern…</p>
  </div>

  <!-- DRAWER STORICO -->
  <div id="storico-backdrop" hidden></div>
  <aside id="storico-drawer" aria-label="Storico delle mappe" hidden>
    <div class="storico-head">
      <h2 data-i18n="storico.title">Le tue mappe</h2>
      <button id="storico-close" class="icon-btn" type="button" aria-label="Chiudi" data-i18n-attr="aria-label:dialog.close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div id="storico-list"></div>
  </aside>

  <!-- Libreria PDF vendorizzata (nessun CDN/build): espone window.jspdf -->
  <script src="vendor/jspdf.umd.min.js" defer></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
